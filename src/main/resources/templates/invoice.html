<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: Arial, sans-serif;
            color: #333;
            margin: 40px;
        }

        .header {
            background-color: #1976d2;
            color: white;
            padding: 20px;
            border-radius: 8px;
        }

        .header h1 {
            margin: 0;
            font-size: 26px;
        }

        .invoice-info {
            margin-top: 20px;
            display: table;
            width: 100%;
        }

        .box {
            display: table-cell;
            width: 50%;
            padding: 15px;
            border: 1px solid #ddd;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th {
            background-color: #1976d2;
            color: white;
            padding: 10px;
            text-align: left;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .text-right {
            text-align: right;
        }

        .total {
            margin-top: 25px;
            text-align: right;
            font-size: 20px;
            font-weight: bold;
            color: #1976d2;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: #777;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>LAU MARKET</h1>
    <p>Factura de compra</p>
</div>

<div class="invoice-info">
    <div class="box">
        <h3>Cliente</h3>
        <p th:text="${clientName}">Nombre del cliente</p>
        <p th:text="${clientEmail}">correo@email.com</p>
    </div>

    <div class="box">
        <h3>Factura</h3>
        <p>
            Orden:
            <strong th:text="${orderId}">15</strong>
        </p>
        <p>
            Fecha:
            <span th:text="${date}">15/05/2026</span>
        </p>
    </div>
</div>

<table>
    <thead>
    <tr>
        <th>Producto</th>
        <th class="text-right">Precio</th>
        <th class="text-right">Cantidad</th>
        <th class="text-right">Subtotal</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="item : ${products}">
        <td th:text="${item.name}">Producto</td>
        <td th:text="${item.price}">$10.00</td>
        <td th:text="${item.quantity}">2</td>
        <td class="text-right" th:text="${item.subtotal}">$20.00</td>
    </tr>
    </tbody>
</table>

<div class="total">
    Total:
    <span th:text="${total}">$20.00</span>
</div>

<div class="footer">
    Gracias por tu compra. Esta factura fue generada automáticamente.
</div>

</body>
</html>
