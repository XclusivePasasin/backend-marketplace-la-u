# ==================================================
# CONFIGURACION DE CARGA DE ARCHIVOS (FILE UPLOAD)
# ==================================================

# Limitar tamano maximo de archivo a 5MB
spring.servlet.multipart.max-file-size=5MB

# Limitar tamano maximo de request completo a 5MB
spring.servlet.multipart.max-request-size=5MB

# Habilitar multipart uploads
spring.servlet.multipart.enabled=true

# Ruta de almacenamiento de imagenes (carpeta uploads en la raiz del proyecto)
upload.path=uploads

# URL base de la aplicacion (cambiar en produccion)
app.base-url=http://localhost:8080