spring.application.name=marketplace-la-u
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://api.lauapp.es:3306/db_laumarket}
spring.datasource.username=${DB_USERNAME:dev_laumarket}
spring.datasource.password=${DB_PASSWORD:laumarket123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==================================================
# CONFIGURACI”N DE CARGA DE ARCHIVOS (FILE UPLOAD)
# ==================================================

# Limitar tamaÒo m·ximo de archivo a 5MB
spring.servlet.multipart.max-file-size=5MB

# Limitar tamaÒo m·ximo de request completo a 5MB
spring.servlet.multipart.max-request-size=5MB

# Habilitar multipart uploads
spring.servlet.multipart.enabled=true

# Ruta de almacenamiento de im·genes (carpeta uploads en la raÌz del proyecto)
upload.path=uploads

# URL base de la aplicaciÛn (cambiar en producciÛn)
app.base-url=http://localhost:8080