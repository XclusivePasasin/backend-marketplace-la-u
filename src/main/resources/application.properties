spring.application.name=marketplace-la-u
server.port=8080

spring.datasource.url=jdbc:mysql://api.lauapp.es:3306/db_laumarket
spring.datasource.username=dev_laumarket
spring.datasource.password=laumarket123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==================================================
# CONFIGURACIÓN DE CARGA DE ARCHIVOS (FILE UPLOAD)
# ==================================================

# Limitar tamańo máximo de archivo a 5MB
spring.servlet.multipart.max-file-size=5MB

# Limitar tamańo máximo de request completo a 5MB
spring.servlet.multipart.max-request-size=5MB

# Habilitar multipart uploads
spring.servlet.multipart.enabled=true

# Ruta de almacenamiento de imágenes (carpeta uploads en la raíz del proyecto)
upload.path=uploads

# URL base de la aplicación (cambiar en producción)
app.base-url=http://localhost:8080